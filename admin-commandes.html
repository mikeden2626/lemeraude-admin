<!DOCTYPE html>
<html lang="fr"><head><title>Admin — Commandes</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#0F1B32;--navy2:#1B2A4A;--gold:#C9A84C;--gold2:#E8D5A3;--white:#fff;--pearl:#F8F5EF;--text:#1a1a2e;--muted:#7A8099;--green:#27AE60;--red:#E74C3C;--orange:#F39C12;--blue:#3498DB;--bg:#F0F2F5;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:72px}
.top-bar{background:var(--navy);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;border-bottom:2px solid var(--gold)}
.top-left{display:flex;align-items:center;gap:10px}
.top-logo{width:34px;height:34px;object-fit:contain;border-radius:3px}
.top-title{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--white);font-weight:300}
.top-badge{background:var(--gold);color:var(--navy);font-size:.56rem;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.08em;text-transform:uppercase;margin-left:6px}
.btm-nav{position:fixed;bottom:0;left:0;right:0;background:var(--navy);border-top:2px solid rgba(201,168,76,.3);display:flex;height:62px;z-index:300}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;color:rgba(255,255,255,.35);font-family:'Jost',sans-serif;font-size:.54rem;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;padding:5px 2px;text-decoration:none;transition:color .2s}
.bn.active,.bn:active{color:var(--gold)}
.bn-ico{font-size:1.15rem;line-height:1}
.pad{padding:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:.64rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid #e4e8f0;border-radius:8px;font-family:'Jost',sans-serif;font-size:.87rem;color:var(--text);background:var(--white);outline:none;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy2)}
.field textarea{min-height:72px;resize:vertical}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:11px 18px;border-radius:8px;border:none;font-family:'Jost',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .18s}
.btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:active{background:var(--gold2)}
.btn-navy{background:var(--navy);color:var(--gold)}
.btn-ghost{background:transparent;border:1.5px solid #e4e8f0;color:var(--muted)}
.btn-full{width:100%}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.6rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.b-stock{background:rgba(39,174,96,.1);color:var(--green);border:1px solid rgba(39,174,96,.2)}
.b-sold{background:rgba(231,76,60,.1);color:var(--red);border:1px solid rgba(231,76,60,.2)}
.b-reserve{background:rgba(243,156,18,.1);color:var(--orange);border:1px solid rgba(243,156,18,.2)}
.b-hidden{background:rgba(127,140,141,.1);color:#7F8C8D;border:1px solid rgba(127,140,141,.2)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:800;display:none;overflow-y:auto;backdrop-filter:blur(3px);padding:16px}
.modal-ov.open{display:block}
.modal-box{background:var(--white);border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.modal-head{background:var(--navy);padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--white);font-weight:300}
.modal-close{background:transparent;border:none;color:rgba(255,255,255,.6);font-size:1rem;cursor:pointer;padding:4px}
.modal-body{padding:16px}
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--navy);color:var(--white);padding:9px 18px;border-radius:8px;border-left:3px solid var(--gold);font-size:.8rem;z-index:9999;opacity:0;transition:all .25s;white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,.25);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
<style>
.order-row{background:var(--white);border:1px solid #e4e8f0;border-radius:10px;padding:14px;margin-bottom:10px}
.or-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.or-id{font-size:.7rem;color:var(--muted);letter-spacing:.08em}
.or-client{font-size:.88rem;font-weight:600;color:var(--text);margin-top:2px}
.or-date{font-size:.68rem;color:var(--muted)}
.or-items{font-size:.78rem;color:var(--muted);margin-bottom:5px}
.or-total{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--navy)}
.or-btns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
</style></head><body>

<div class="pad">
  <div style="font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:300;margin-bottom:16px">📩 Commandes reçues</div>
  <div id="orders-list"></div>
</div>
<nav class="btm-nav"><a href="dashboard.html" class="bn"><span class="bn-ico">📊</span>Tableau</a><a href="ajouter.html" class="bn"><span class="bn-ico">📸</span>Ajouter</a><a href="stock.html" class="bn"><span class="bn-ico">💎</span>Stock</a><a href="commandes.html" class="bn active"><span class="bn-ico">📩</span>Commandes</a><a href="promos.html" class="bn"><span class="bn-ico">🎟️</span>Promos</a></nav>
<div class="toast" id="toast"></div>
<script>
let orders = JSON.parse(localStorage.getItem('em_orders') || '[]');
function saveOrders() { localStorage.setItem('em_orders', JSON.stringify(orders)); }
const stMap = {pending:'🟡 En attente', paid:'✅ Payee', shipped:'📦 Expediee', done:'✔️ Terminee'};
function render() {
  const list = document.getElementById('orders-list');
  if(!orders.length) {
    list.innerHTML = `<div style="text-align:center;padding:48px 16px;color:var(--muted)"><div style="font-size:2.5rem;opacity:.3;margin-bottom:12px">📩</div><p>Aucune commande pour le moment</p><p style="font-size:.76rem;margin-top:6px;opacity:.7">Les commandes apparaitront ici</p></div>`;
    return;
  }
  list.innerHTML = orders.map(o => `
    <div class="order-row">
      <div class="or-head">
        <div><div class="or-id">#${o.id}</div><div class="or-client">${o.client}</div></div>
        <div style="text-align:right"><div class="or-date">${o.date}</div><span class="badge b-stock" style="font-size:.6rem">${stMap[o.status]||o.status}</span></div>
      </div>
      <div class="or-items">${o.items.map(i => i.name + ' x' + i.qty).join(', ')}</div>
      <div class="or-total">${o.total.toLocaleString('fr-FR')} €</div>
      ${o.email ? `<div style="font-size:.72rem;color:var(--muted);margin-top:4px">📧 ${o.email}${o.phone ? ' · 📱 ' + o.phone : ''}</div>` : ''}
      ${o.address ? `<div style="font-size:.72rem;color:var(--muted);margin-top:2px">📍 ${o.address}</div>` : ''}
      <div class="or-btns">
        <button class="btn" style="padding:7px 12px;font-size:.7rem;background:#f8f5ef;border:1.5px solid #e4e8f0" onclick="mark('${o.id}','shipped')">📦 Expediee</button>
        <button class="btn btn-green" style="padding:7px 12px;font-size:.7rem;border:none" onclick="mark('${o.id}','done')">✔️ Terminee</button>
      </div>
    </div>`).join('');
}
function mark(id, st) {
  const o = orders.find(x => x.id === id);
  if(o) { o.status = st; saveOrders(); render(); showToast('Commande mise a jour'); }
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}
render();
</script>
